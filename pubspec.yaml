name: iot_mastery
description: "IoT Mastery - Smart Learning App for IoT"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  provider: ^6.1.2
  
  # UI & Animations
  lottie: ^3.1.0
  google_fonts: ^8.1.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.0.10
  animated_bottom_navigation_bar: ^1.3.3
  glassmorphism: ^3.0.0
  
  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  
  # Video & Audio
  youtube_player_flutter: ^9.1.3
  flutter_tts: ^4.2.5
  speech_to_text: ^7.3.0
  
  # Utilities
  http: ^1.6.0
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/
